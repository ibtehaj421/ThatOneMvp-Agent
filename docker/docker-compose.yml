name: "anam-agent"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: anam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anam_password}
      POSTGRES_DB: ${POSTGRES_DB:-anam_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - anam_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anam_user} -d ${POSTGRES_DB:-anam_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  anam_pgdata:
    driver: local
